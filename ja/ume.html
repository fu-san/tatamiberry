<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>梅 | Tatamiberry</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%;background:linear-gradient(160deg,#fdf0f4 0%,#fdf5f7 100%)}
body{font-family:'Georgia','Noto Serif JP',serif;display:flex;justify-content:center}
.page{width:100%;max-width:430px;min-height:100vh;position:relative;padding:0 0 80px;overflow:hidden}
.petal{position:absolute;opacity:0.18;pointer-events:none;font-size:22px}
.p1{top:4%;left:3%}.p2{top:8%;right:5%}.p3{top:18%;left:1%}
.p4{bottom:22%;right:2%}.p5{bottom:12%;left:4%}.p6{top:35%;right:1%}
header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 10px}
.logo{font-size:16px;font-weight:bold;color:#c85070;letter-spacing:0.5px;display:flex;align-items:center;gap:6px}
.logo span{font-size:20px}
.brand-badge{background:#c85070;color:white;font-size:11px;padding:4px 10px;border-radius:20px;letter-spacing:1px}
.subtitle{text-align:center;color:#d87090;font-size:13px;letter-spacing:2px;text-transform:uppercase;margin:6px 0 18px}
.circle-wrap{display:flex;justify-content:center;margin:0 auto 20px;width:240px;height:240px}
.circle-wrap img{width:100%;height:100%;border-radius:50%;object-fit:cover;filter:drop-shadow(0 6px 18px rgba(0,0,0,0.15))}
.name-en{text-align:center;font-size:38px;font-weight:bold;color:#c85070;letter-spacing:1px;line-height:1.1}
.name-ja{text-align:center;font-size:16px;color:#d87090;margin-top:4px;letter-spacing:3px}
.divider{text-align:center;margin:18px 0 16px;color:#c85070;opacity:0.45;font-size:14px;letter-spacing:8px}
.sections{padding:0 24px;display:flex;flex-direction:column;gap:14px}
.section{background:white;border-radius:14px;padding:14px 18px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.label{display:inline-block;color:white;font-size:11px;font-weight:bold;padding:3px 12px;border-radius:20px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:9px}
.lbl-meaning{background:#c85070}
.lbl-wish{background:#d87090}
.section p{font-size:15px;color:#585048;line-height:1.7;font-style:italic}
.character{position:relative;display:block;text-align:right;padding:10px 16px 0 0;margin-top:10px}
.character img{width:140px;height:auto;background:transparent;display:block;margin-left:auto;mix-blend-mode:multiply}
footer{text-align:center;color:#b8b0a8;font-size:11px;margin-top:20px;letter-spacing:1px;padding:0 20px}
.footer-logo{font-size:14px;font-weight:bold;color:#c85070;opacity:0.7;margin-bottom:4px}

/* ── read more ── */
.read-more-btn{display:none;background:none;border:none;font-size:13px;font-weight:bold;cursor:pointer;padding:5px 0 0;letter-spacing:0.5px;font-family:inherit;text-decoration:underline}
.read-more-btn:hover{opacity:0.7}
.meaning-extra{display:none}

.lang-btn{font-size:11px;color:#888;text-decoration:none;padding:4px 10px;border:1px solid #ddd;border-radius:20px;letter-spacing:0.5px}
</style>
</head>
<body>
<div class="page">
  <div class="petal p1">🌸</div>
  <div class="petal p2">🌺</div>
  <div class="petal p3">🌸</div>
  <div class="petal p4">🌸</div>
  <div class="petal p5">🌺</div>
  <div class="petal p6">🌸</div>

  <header>
    <div class="logo"><span>🍓</span>Tatamiberry</div>
    <a class="lang-btn" href="../ume.html">🇬🇧 English</a>
    <div class="brand-badge">あなたの文様</div>
  </header>

  <p class="subtitle">✦ あなたの文様ストーリー ✦</p>

  <div class="circle-wrap">
    <img src="../ume_icon.png" alt="梅文様" onerror="this.style.display='none';this.parentElement.style.background='radial-gradient(circle at 40% 35%, #e87090, #a83060)';this.parentElement.style.borderRadius='50%'">
  </div>

  <h1 class="name-en">Ume</h1>
  <p class="name-ja">梅</p>

  <div class="divider">✿ &nbsp; ✿ &nbsp; ✿</div>

  <div class="sections">
    <div class="section">
      <span class="label lbl-meaning">意味</span>
      <p>梅の花は日本で古くから愛される縁起の良い文様です。寒い冬を乗り越えて咲く強さから、不屈の精神と新しいはじまりの象徴とされています。お祝いの場や特別な機会に特に愛されています。</p>
    </div>
    <div class="section">
      <span class="label lbl-wish">願い</span>
      <p>冬の梅の花のように、勇気を持って咲き誇れますように。</p>
    </div>
  </div>

  <div class="character">
    <img src="../hanarin_smile.png" alt="花凜ちゃん">
  </div>

  <footer>
    <div class="footer-logo">🍓 Tatamiberry</div>
    © Tatamiberry. 日本から愛を込めて。
  </footer>
</div>

<script>
function toggleMeaning(btn){
  var extra=btn.previousElementSibling;
  if(extra.style.display==='none'||extra.style.display===''){
    extra.style.display='inline';
    btn.textContent='閉じる ▲';
  }else{
    extra.style.display='none';
    btn.textContent='続きを読む ▼';
  }
}
window.addEventListener('DOMContentLoaded',function(){
  document.querySelectorAll('.meaning-extra').forEach(function(el){
    var btn=el.nextElementSibling;
    if(btn&&btn.classList.contains('read-more-btn')){
      btn.style.display='block';
    }
  });
});
</script>

</body>
</html>
